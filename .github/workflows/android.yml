name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Fix Gradle deprecated flags
        run: |
          sed -i '/android.enableAapt2/d' android/gradle.properties || true
          sed -i '/android.enableAapt2/d' android/app/build.gradle || true

      - name: Build Android APK
        run: |
          npx cap sync android
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CoastGuard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
