name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd CoastguardNative
          npm ci

      - name: Build web assets
        run: |
          cd CoastguardNative
          npm run build

      - name: Sync Capacitor
        run: |
          cd CoastguardNative
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          cd CoastguardNative/android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Coastguard-APK
          path: CoastguardNative/android/app/build/outputs/apk/debug/app-debug.apk
